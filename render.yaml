services:
  # ── HawkNet-Ai Backend API (FastAPI) ───────────────────────────
  - type: web
    name: hawknet-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHONPATH
        value: .
      - key: APP_NAME
        value: HawkNet-Ai
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        value: hawknet-ai-production-jwt-secret-key-9823479238479238
      - key: CORS_ORIGINS
        value: '*'
      - key: DATABASE_URL
        value: sqlite:////tmp/app.db
      - key: RATE_LIMIT_ENABLED
        value: 'true'
      - key: PYTHON_VERSION
        value: 3.11.9

  # ── HawkNet-Ai Frontend SPA (React / Vite) ──────────────────────
  - type: web
    name: hawknet-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: sqlite:////app/db/app.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
      # Rate limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_PER_MINUTE: "60"
      # Call session TTL
      CALL_SESSION_TTL_SECONDS: "3600"
      # Alert webhook — set to a real URL to enable webhook dispatch
      # ALERT_WEBHOOK_URL: https://your-mha-endpoint.example.com/alert
    volumes:
      - ./backend:/app
      - backend_db:/app/db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  backend_db:
